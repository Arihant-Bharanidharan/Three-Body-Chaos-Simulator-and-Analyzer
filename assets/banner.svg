<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Mapping Stability and Chaos in the Three-Body Problem</title>
  <desc id="desc">A stylized three-body orbit diagram with finite-time chaos diagnostics labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#10162a"/>
      <stop offset="1" stop-color="#20132b"/>
    </linearGradient>
    <linearGradient id="orbitA" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="orbitB" x1="0" x2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="32" fill="url(#bg)"/>
  <g opacity="0.22">
    <path d="M0 92 H1400 M0 184 H1400 M0 276 H1400 M0 368 H1400" stroke="#dbeafe" stroke-width="1"/>
    <path d="M124 0 V420 M268 0 V420 M412 0 V420 M556 0 V420 M700 0 V420 M844 0 V420 M988 0 V420 M1132 0 V420 M1276 0 V420" stroke="#dbeafe" stroke-width="1"/>
  </g>

  <g transform="translate(175 42)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M175 160 C260 20 460 22 528 160 C456 300 260 302 175 160 Z" stroke="url(#orbitA)" stroke-width="5" opacity="0.92" filter="url(#glow)"/>
    <path d="M175 160 C90 28 -96 44 -134 158 C-82 292 88 300 175 160 Z" stroke="url(#orbitB)" stroke-width="5" opacity="0.88" filter="url(#glow)"/>
    <path d="M-134 158 C20 70 370 71 528 160 C365 255 24 254 -134 158 Z" stroke="#f8fafc" stroke-width="2.5" opacity="0.42"/>
    <circle cx="-80" cy="126" r="13" fill="#67e8f9" filter="url(#glow)"/>
    <circle cx="178" cy="160" r="15" fill="#fbbf24" filter="url(#glow)"/>
    <circle cx="462" cy="195" r="13" fill="#fb7185" filter="url(#glow)"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#f8fafc">
    <text x="700" y="114" font-size="48" font-weight="800" letter-spacing="0">
      Mapping Stability and Chaos
    </text>
    <text x="704" y="166" font-size="31" font-weight="600" fill="#c4b5fd">
      in the Newtonian Three-Body Problem
    </text>
    <text x="704" y="220" font-size="21" fill="#cbd5e1">
      finite-time diagnostics . Lyapunov spectra . reversibility . conservation checks
    </text>
    <g font-size="18" font-weight="700">
      <rect x="704" y="255" width="142" height="38" rx="19" fill="#0f766e" opacity="0.86"/>
      <text x="724" y="280">REBOUND</text>
      <rect x="864" y="255" width="104" height="38" rx="19" fill="#7c3aed" opacity="0.86"/>
      <text x="889" y="280">IAS15</text>
      <rect x="986" y="255" width="154" height="38" rx="19" fill="#be123c" opacity="0.82"/>
      <text x="1008" y="280">18D spectrum</text>
      <rect x="1158" y="255" width="142" height="38" rx="19" fill="#0369a1" opacity="0.86"/>
      <text x="1182" y="280">claim gated</text>
    </g>
  </g>

  <text x="48" y="382" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#94a3b8">
    HCI is a normalized diagnostic embedding, not a physical invariant.
  </text>
</svg>
