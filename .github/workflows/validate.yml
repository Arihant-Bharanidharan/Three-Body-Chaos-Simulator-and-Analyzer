name: validate

on:
  push:
  pull_request:

jobs:
  smoke:
    name: Python smoke validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile sources
        run: python -m py_compile 3BS-Simulator.py analyzer.py three_body_chaos_modules/*.py

      - name: Check command-line interfaces
        run: |
          python 3BS-Simulator.py --help > /tmp/3bs_simulator_help.txt
          python analyzer.py --help > /tmp/analyzer_help.txt
